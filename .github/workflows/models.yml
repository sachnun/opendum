name: Refresh Provider Models

on:
  workflow_dispatch:
  schedule:
    - cron: "22 3 * * *"

permissions:
  contents: write

jobs:
  refresh-models:
    name: Refresh Provider Models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh provider models
        run: pnpm run models:refresh -- --summary "$RUNNER_TEMP/summary.md"

      - name: Build commit message
        id: commit_msg
        run: |
          echo 'msg<<EOF' >> "$GITHUB_OUTPUT"
          echo 'chore: refresh provider model registry' >> "$GITHUB_OUTPUT"
          echo '' >> "$GITHUB_OUTPUT"
          if [ -f "$RUNNER_TEMP/summary.md" ]; then
            cat "$RUNNER_TEMP/summary.md" >> "$GITHUB_OUTPUT"
          fi
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ steps.commit_msg.outputs.msg }}
