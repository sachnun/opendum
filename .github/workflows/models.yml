name: Refresh Provider Models

on:
  workflow_dispatch:
  schedule:
    - cron: "22 3 * * *"

permissions:
  contents: write

jobs:
  refresh-models:
    name: Refresh Provider Models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Refresh provider models
        run: bun run models:refresh -- --summary "$RUNNER_TEMP/summary.md"

      - name: Build commit message
        id: commit_msg
        run: |
          echo 'msg<<EOF' >> "$GITHUB_OUTPUT"
          echo 'chore: refresh provider model registry' >> "$GITHUB_OUTPUT"
          echo '' >> "$GITHUB_OUTPUT"
          if [ -f "$RUNNER_TEMP/summary.md" ]; then
            cat "$RUNNER_TEMP/summary.md" >> "$GITHUB_OUTPUT"
          fi
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: ${{ steps.commit_msg.outputs.msg }}
