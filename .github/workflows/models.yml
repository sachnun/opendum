name: Refresh Provider Model Maps

on:
  workflow_dispatch:
  schedule:
    - cron: "22 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-model-maps:
    name: Refresh Provider Model Maps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh provider model maps
        run: pnpm run models:refresh -- --summary "$RUNNER_TEMP/pr-body.md"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh provider model maps"
          title: "chore: refresh provider model maps"
          body-path: ${{ runner.temp }}/pr-body.md
          branch: chore/refresh-provider-model-maps
          delete-branch: true
