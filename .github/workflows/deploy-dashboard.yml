name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-dashboard.yml
      - apps/dashboard/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Dashboard Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dashboard for Cloudflare Workers
        run: pnpm --filter @opendum/dashboard build
        env:
          NITRO_PRESET: cloudflare_module

      - name: Deploy dashboard to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: 4.85.0
          workingDirectory: apps/dashboard
          command: --cwd .output deploy --keep-vars
