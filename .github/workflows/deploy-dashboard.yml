name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-dashboard.yml
      - apps/dashboard/**
      - models/**
      - package.json
      - package-lock.json
  workflow_run:
    workflows:
      - Refresh Provider Models
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: edgeone-dashboard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    name: Dashboard EdgeOne Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy dashboard to EdgeOne Pages
        working-directory: apps/dashboard
        run: npx edgeone pages deploy -n opendum -t ${{ secrets.EDGEONE_API_TOKEN }} -e production
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
