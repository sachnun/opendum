name: Refresh Provider Model Maps

on:
  workflow_dispatch:
  schedule:
    - cron: "22 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-model-maps:
    name: Refresh Provider Model Maps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Refresh provider model maps
        run: bun run models:refresh -- --summary "$RUNNER_TEMP/pr-body.md"

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh provider model maps"
          title: "chore: refresh provider model maps"
          body-path: ${{ runner.temp }}/pr-body.md
          branch: chore/refresh-provider-model-maps
          delete-branch: true
