[build]
builder = "railpack"
buildCommand = "pnpm --filter @opendum/shared build && pnpm --filter @opendum/proxy build"
ignoredPaths = [
  "apps/dashboard/**",
  "scripts/**",
  ".github/**",
  "*.md",
  ".env.example",
]

[deploy]
startCommand = "node apps/proxy/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
